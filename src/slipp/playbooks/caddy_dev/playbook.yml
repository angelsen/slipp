---
# Caddy Dev Proxy Installation
#
# Installs Caddy with iptables redirect for dev proxy functionality.
# Traffic flow: :443 → iptables PREROUTING → :8443 (Caddy) → localhost:{fallback_port} (fallback)
#
# Usage: ansible-playbook playbook.yml -i inventory

- name: Install Caddy dev proxy
  hosts: all
  become: true

  tasks:
    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - iptables-persistent
          - jq
        state: present
        update_cache: true

    - name: Remove legacy Caddy apt source (superseded by deb822_repository)
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/caddy-stable.list
        state: absent

    - name: Remove legacy Caddy GPG keyring (superseded by deb822_repository)
      ansible.builtin.file:
        path: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
        state: absent

    - name: Add Caddy apt repository
      ansible.builtin.deb822_repository:
        name: caddy-stable
        types: [deb, deb-src]
        uris: https://dl.cloudsmith.io/public/caddy/stable/deb/debian
        suites: any-version
        components: main
        signed_by: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
        install_python_debian: true

    - name: Install Caddy
      ansible.builtin.apt:
        name: caddy
        state: present
        update_cache: true

    - name: Stop stuck Caddy if in bad state
      ansible.builtin.shell: |
        state=$(systemctl is-active caddy 2>/dev/null || echo "inactive")
        if [ "$state" = "reloading" ] || [ "$state" = "failed" ]; then
          systemctl kill caddy 2>/dev/null || true
          systemctl reset-failed caddy 2>/dev/null || true
        fi
      changed_when: false

    - name: Deploy Caddyfile
      ansible.builtin.template:
        src: templates/Caddyfile.j2
        dest: /etc/caddy/Caddyfile
        mode: "0644"
        backup: true
      notify: Restart Caddy

    - name: Validate Caddyfile syntax
      ansible.builtin.command: caddy validate --config /etc/caddy/Caddyfile
      changed_when: false

    - name: Add iptables PREROUTING rule (redirect :443 to :8443)
      # in_interface scopes this to genuinely inbound traffic on the public
      # NIC only - without it, PREROUTING (which every packet crosses before
      # routing, including a local container's outbound connection that
      # happens to target port 443 on some unrelated remote host) redirects
      # ALL port-443 traffic system-wide to Caddy, silently hijacking every
      # HTTPS connection a docker/podman deploy tries to make (pip/apt/image
      # pulls, etc.) on this host.
      ansible.builtin.iptables:
        table: nat
        chain: PREROUTING
        protocol: tcp
        destination_port: "443"
        in_interface: "{{ ansible_default_ipv4.interface }}"
        jump: REDIRECT
        to_ports: "8443"
        comment: slipp dev proxy
      notify: Save iptables

    - name: Ensure Caddy is running and enabled
      ansible.builtin.systemd:
        name: caddy
        state: started
        enabled: true

  handlers:
    - name: Restart Caddy
      ansible.builtin.systemd:
        name: caddy
        state: restarted

    - name: Save iptables
      ansible.builtin.shell: |
        iptables-save > /etc/iptables/rules.v4
      args:
        executable: /bin/bash
      changed_when: false
